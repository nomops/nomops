name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同一分支/PR 的旧运行取消，省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # 读 package.json 的 packageManager 定版本

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # frozen-lockfile 保证与锁定一致；onlyBuiltDependencies 放行 argon2/better-sqlite3 等原生构建
      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      # 测试全在进程内（SQLite + PGlite），无需 Postgres/Redis 服务
      - run: pnpm test
